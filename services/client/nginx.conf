# For more information on configuration, see:
#   * Official English Documentation: http://nginx.org/en/docs/
#   * Official Russian Documentation: http://nginx.org/ru/docs/


worker_processes auto;
error_log /var/log/nginx/error.log;
pid /var/run/nginx/nginx.pid;

# Load dynamic modules. See /usr/share/doc/nginx/README.dynamic.
include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    # Load modular configuration files from the /etc/nginx/conf.d directory.
    # See http://nginx.org/en/docs/ngx_core_module.html#include
    # for more information.
    include /opt/app-root/etc/nginx.d/*.conf;

    # server {
    #     listen       8080 default_server;
    #     listen       [::]:8080 default_server;
    #     server_name  _;
    #     root         /opt/app-root/src;

    #     # Load configuration files for the default server block.
    #     include /opt/app-root/etc/nginx.default.d/*.conf;

    #     location = /404.html {
    #     }

    # }

    # security
    add_header Set-Cookie "SameSite=Strict";
    proxy_cookie_path / "/; secure; HttpOnly; SameSite=strict";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Access-Control-Allow-Origin "null";
    server_tokens off;
    add_header Content-Security-Policy "
        default-src 'none';
        img-src 'self' data: api.maptiler.com;
        style-src 'self' 'unsafe-hashes' 'sha256-JYsO83ExUe+QAZ6wMV20BU+7xt/XdNX8xs4k1/QV4QA=' 'sha256-IogPL/JngkXoycgyLh/OM6Pn6PceDlXMA6QC+ah4yes=';
        style-src-elem 'self' 'unsafe-inline';
        script-src-elem 'self';
        font-src *;
        frame-ancestors 'none';
        connect-src 'self' ws: wss: api.maptiler.com;
        worker-src 'self' blob:;
    ";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload";

    # same site cookie
    proxy_cookie_flags ~ samesite=strict;

    server {
        listen 9000;# ssl;
        server_name localhost;

        # set maximum request size
        client_max_body_size 1G;

        # SSL/https
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384;
        # ssl_prefer_server_ciphers on;
        # ssl_session_cache shared:SSL:10m;
        # ssl_ecdh_curve secp384r1;

        # ssl_certificate /etc/nginx/conf.d/ssl/nginx.crt;
        # ssl_certificate_key /etc/nginx/conf.d/ssl/nginx.key;
        # ssl_dhparam /etc/nginx/conf.d/ssl/dhparam.pem;

        # validate query string as well
        if ($query_string !~* "^[a-zA-Z0-9_\- \x1e\x1f&<>./();:,\$=*#+@|\\\"\'\[\]\{\}\"]*$") {
            return 400 "Invalid query string \n";
        }

        # General flag to block request if suspicious header is found
        set $block_request 0;
        # Check if the User-Agent header matches the allowed pattern
        if ($http_user_agent !~* "^[a-zA-Z0-9_\- \.\/();:,\$=*#+@|\\\"\'\[\]\{\}\~\"]*$") {
            set $block_request 1;
        }
        # Check if the Referer header matches the allowed pattern
        if ($http_referer !~* "^[a-zA-Z0-9_\- \x1e\x1f&<>./();:,\$=*?#+@|\\\"\'\[\]\{\}\"]*$") {
            set $block_request 1;
        }
        # Block malicious patterns with `$`
        if ($http_user_agent ~* "\$\(") {  # Prevent $() subshell execution
            set $block_request 1;
        }
        if ($http_user_agent ~* "\$\{") {  # Prevent ${} variable expansion
            set $block_request 1;
        }
        # If any header does not match the pattern, block the request with 400 Bad Request
        if ($block_request) {
            return 400 "Bad Request: Header contains invalid characters";
        }

        # enable logs
        access_log /var/log/nginx/nginx.access.log;
        error_log /var/log/nginx/nginx.error.log;

        # # Block and redirect to NotFound page for specific existing static files
        # location ~* ^/(js|png|css|woff2|woff|eot|ttf|svg|ico)/.*$ {
        #     return 404;
        # }

        # # Custom 404 handling: Serve NotFound page with a 404 status
        # error_page 404 /index.html;
        # location = /index.html {
        #     root /usr/share/nginx/html;
        #     internal;
        #     add_header Cache-Control "no-cache";
        # }


        location / {
            # Add SameSite=Strict to all cookies
            add_header Set-Cookie "SameSite=Strict";
            proxy_cookie_path / "/; secure; HttpOnly; SameSite=strict";
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        location = /assets {
            return 404;
        }

        location = /demo {
            return 404;
        }

        location = /demo/images {
            return 404;
        }

        location = /demo/images/access {
            return 404;
        }

        location = /demo/images/error {
            return 404;
        }

        location = /icons {
            return 404;
        }

        location = /layout/images {
            return 404;
        }

        location = /themes {
            return 404;
        }

        location = /themes/aura-dark-blue {
            return 404;
        }

        location = /themes/aura-dark-blue/fonts {
            return 404;
        }

        location = /themes/aura-light-blue {
            return 404;
        }

        location = /themes/aura-light-blue/fonts {
            return 404;
        }

        location ~ \.(js|png|css|woff2|woff|eot|ttf|svg|ico) {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store";
            add_header Pragma "no-cache";
            add_header Set-Cookie "SameSite=Strict";
            proxy_cookie_path / "/; secure; HttpOnly; SameSite=strict";
            add_header X-Content-Type-Options "nosniff";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
            add_header Access-Control-Allow-Origin "null";
            server_tokens off;
            add_header Content-Security-Policy "
                default-src 'none';
                img-src 'self' data: api.maptiler.com;
                style-src 'self' 'unsafe-hashes' 'sha256-JYsO83ExUe+QAZ6wMV20BU+7xt/XdNX8xs4k1/QV4QA=' 'sha256-IogPL/JngkXoycgyLh/OM6Pn6PceDlXMA6QC+ah4yes=';
                style-src-elem 'self' 'unsafe-inline';
                script-src-elem 'self';
                font-src *;
                frame-ancestors 'none';
                connect-src 'self' ws: wss: api.maptiler.com;
                worker-src 'self' blob:;
            ";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload";
            try_files $uri $uri/ =404;
        }

        # Need to uncomment this block if you run on local
        # location /api/ {
        #     proxy_pass http://backend:5000;
        #     proxy_http_version 1.1;
        #     proxy_redirect default;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection "upgrade";
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Host $server_name;
        # }

        # Need to uncomment this block if you run on local
        # location /socket.io/ {
        #     proxy_pass http://backend:5000;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection "Upgrade";
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Host $server_name;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }
    }
}
